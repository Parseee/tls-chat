services:
  chat:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    ports:
      - "443:8888"
      - "80:80"
    volumes:
      - /etc/ssl/tls-chat:/etc/letsencrypt:ro
      - ./static:/home/ilababakov/tls-chat/static
    restart: always
    platform: linux/amd64
    environment:
      - CCACHE_DIR=/ccache
      - CCACHE_MAXSIZE=10G
