<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TLS Chat</title>
    <style>
        body { background: white; color: black; font-family: monospace; padding: 20px; }
        #chat { height: 400px; border: 1px solid black; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        #input { background: white; color: black; border: 1px solid black; width: 80%; padding: 5px; }
        #send { background: white; color: black; border: none; padding: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <input type="text" id="input" autofocus>
    <button id="send" onclick="send()">Send</button>

    <script>
        // const ws = new WebSocket(`wss://${window.location.host}/ws`);
        const ws = new WebSocket("wss://localhost:8888");
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');

        ws.onmessage = (event) => {
            chat.innerHTML += `<div>${event.data}</div>`;
            chat.scrollTop = chat.scrollHeight;
        };

        function send() {
            if(!input.value) return;
            ws.send(input.value);
            input.value = '';
        }
        input.addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
    </script>
</body>
</html>
