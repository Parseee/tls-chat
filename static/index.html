<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TLS Chat</title>
    <style>
        body {
            background: white;
            color: black;
            font-family: monospace;
            padding: 20px;
        }

        #chat {
            height: 400px;
            border: 1px solid black;
            overflow-y: scroll;
            padding: 10px;
            margin-bottom: 10px;
        }

        #input {
            background: white;
            color: black;
            border: 1px solid black;
            width: 80%;
            padding: 5px;
        }

        #send {
            background: white;
            color: black;
            border: none;
            padding: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>/b - <a href="/docs.html" style="font-size: 0.5em; text-decoration: none; color: blue;">View Documentation</a></h1>
    <div id="chat"></div>
    <input type="text" id="input" autofocus>
    <button id="send" onclick="send()">Send</button>

    <script>
        // Dynamically connect to whichever host/IP the browser used to load the page
        const ws = new WebSocket(`wss://${window.location.host}/ws`);
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');

        ws.onmessage = (event) => {
            chat.innerHTML += `<div>${event.data}</div>`;
            chat.scrollTop = chat.scrollHeight;
        };

        function send() {
            if (!input.value) return;

            const msg = input.value;
            ws.send(msg);

            chat.innerHTML += `<div style="color: blue;"\> ${msg}</div>`;
            chat.scrollTop = chat.scrollHeight;

            input.value = '';
        }
        input.addEventListener("keypress", (e) => { if (e.key === "Enter") send(); });
    </script>
</body>

</html>
